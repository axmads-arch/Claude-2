<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Mening Kafem</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header" id="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-img">🍽️</div>
      <div>
        <div class="logo-name">Mening Kafem</div>
        <div class="logo-sub">📍 Toshkent, Uzbekiston</div>
      </div>
    </div>
    <button class="cart-btn" onclick="openCart()">
      <span>🛒</span>
      <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="Taom qidirish..." id="searchInput" oninput="filterProducts()">
  </div>
  <div class="categories" id="categories"></div>
</div>

<div class="main" id="main">
  <div class="banner">
    <div class="banner-text">
      <h2>Mazali taomlar 🔥</h2>
      <p>Tez va qulay yetkazib berish</p>
    </div>
    <div class="banner-emoji">🍜</div>
  </div>
  <div class="section-title">Barcha taomlar</div>
  <div class="products-grid" id="productsGrid">
    <div class="loading"><div class="spinner"></div><p>Yuklanmoqda...</p></div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeCart()"></div>

<div class="cart-modal" id="cartModal">
  <div class="modal-handle"></div>
  <div class="cart-header">
    <h2>🛒 Savatcha</h2>
    <button class="close-btn" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer" id="cartFooter"></div>
</div>

<div class="order-modal" id="orderModal">
  <div class="order-header">
    <button class="back-btn" onclick="closeOrder()">←</button>
    <h2>Buyurtma berish</h2>
  </div>
  <div class="order-body">
    <div class="form-group">
      <label>Ismingiz</label>
      <input type="text" placeholder="Ism Familiya" id="orderName">
    </div>
    <div class="form-group">
      <label>Telefon</label>
      <input type="tel" placeholder="+998 90 123 45 67" id="orderPhone">
    </div>
    <div class="form-group">
      <label>Manzil (ixtiyoriy)</label>
      <input type="text" placeholder="Ko'cha, uy raqami" id="orderAddress">
    </div>
    <div class="order-summary" id="orderSummary"></div>
    <button class="order-btn" onclick="submitOrder()">✅ Buyurtma berish</button>
  </div>
</div>

<div class="success-modal" id="successModal">
  <div class="success-box">
    <div class="success-anim">✅</div>
    <h2>Buyurtma qabul qilindi!</h2>
    <p>Tez orada siz bilan bog'lanamiz 📞</p>
    <button onclick="closeSuccess()">Davom etish</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
