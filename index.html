<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Rahmat Chef</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --teal:#1a6b63;
  --teal-dk:#145750;
  --teal-lt:#f0f8f7;
  --teal-mid:#e0f0ee;
  --text:#111;
  --sub:#555;
  --muted:#999;
  --border:#efefef;
  --bg:#fafafa;
  --w:#fff;
  --r:12px;
  --rl:16px;
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--w)}

/* ── HEADER ── */
.header{
  background:var(--w);
  padding:12px 16px 0;
  position:sticky;top:0;z-index:40;
  border-bottom:1px solid var(--border);
}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.brand{display:flex;align-items:center;gap:10px}
.brand-logo{
  width:42px;height:42px;border-radius:50%;
  overflow:hidden;flex-shrink:0;
  background:var(--teal);
}
.brand-logo img{width:100%;height:100%;object-fit:cover}
.brand-info{display:flex;flex-direction:column}
.brand-name{font-size:16px;font-weight:700;color:var(--text);line-height:1.2;letter-spacing:-.3px}
.brand-sub{font-size:10px;color:var(--teal);font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.hdr-icons{display:flex;gap:6px}
.hdr-btn{
  width:36px;height:36px;border-radius:50%;
  border:1px solid var(--border);background:var(--w);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--sub);
  transition:background .15s;
}
.hdr-btn:active{background:var(--teal-lt)}

/* delivery row */
.dlv-row{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px;position:relative}
.dlv-left{display:flex;flex-direction:column;gap:1px}
.dlv-lbl{font-size:11px;color:var(--muted);font-weight:500}
.dlv-addr{font-size:13px;font-weight:600;display:flex;align-items:center;gap:3px;cursor:pointer;color:var(--text)}
.dlv-btn{
  display:flex;align-items:center;gap:6px;
  border:1.5px solid var(--border);border-radius:10px;
  padding:7px 12px;font-size:13px;font-weight:700;
  background:var(--w);cursor:pointer;color:var(--text);
  font-family:'Inter',sans-serif;
}
.dlv-dd{
  position:absolute;top:calc(100%+2px);right:0;
  background:var(--w);border-radius:12px;
  box-shadow:0 8px 28px rgba(0,0,0,.12);
  z-index:99;min-width:180px;overflow:hidden;
}
.dd-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:15px 18px;font-size:14px;font-weight:500;
  cursor:pointer;border-bottom:1px solid var(--border);
  transition:background .15s;
}
.dd-row:last-child{border-bottom:none}
.dd-row:active{background:var(--teal-lt)}
.dd-chk{
  width:20px;height:20px;border-radius:50%;
  background:var(--teal);display:flex;
  align-items:center;justify-content:center;
}

/* ── CATEGORIES ── */
.cats-bar{background:var(--w);border-bottom:1px solid var(--border);position:sticky;top:117px;z-index:39}
.cats-scroll{display:flex;overflow-x:auto;scrollbar-width:none;padding:10px 16px;gap:6px}
.cats-scroll::-webkit-scrollbar{display:none}
.cat-btn{
  flex-shrink:0;display:flex;flex-direction:column;
  align-items:center;gap:5px;border:none;background:none;
  cursor:pointer;min-width:58px;
}
.cat-icon{
  width:52px;height:52px;border-radius:12px;
  background:#f4f4f4;display:flex;align-items:center;
  justify-content:center;font-size:12px;font-weight:700;
  color:var(--sub);transition:all .2s;border:2px solid transparent;
}
.cat-btn.active .cat-icon{background:var(--teal-lt);border-color:var(--teal);color:var(--teal)}
.cat-lbl{font-size:10px;font-weight:500;color:var(--muted);text-align:center;line-height:1.3;max-width:58px}
.cat-btn.active .cat-lbl{color:var(--teal);font-weight:600}

/* ── ADDR BANNER ── */
.addr-banner{
  margin:14px 16px 0;background:var(--teal-lt);
  border-radius:var(--rl);padding:20px 16px;text-align:center;
  border:1px solid var(--teal-mid);
}
.addr-banner h3{font-size:16px;font-weight:700;margin-bottom:5px}
.addr-banner p{font-size:13px;color:var(--sub);margin-bottom:16px;line-height:1.5}
.addr-btns{display:flex;gap:10px}
.btn-later{
  flex:1;padding:12px;border-radius:24px;border:none;
  background:rgba(0,0,0,.07);font-family:'Inter',sans-serif;
  font-size:14px;font-weight:600;cursor:pointer;color:var(--text);
}
.btn-addr{
  flex:1;padding:12px;border-radius:24px;border:none;
  background:var(--teal);font-family:'Inter',sans-serif;
  font-size:14px;font-weight:600;cursor:pointer;color:#fff;
}

/* ── PRODUCTS ── */
.main{padding:16px;padding-bottom:96px}
.sec-title{font-size:19px;font-weight:800;margin-bottom:14px;letter-spacing:-.3px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* CARD */
.card{
  background:var(--w);border-radius:var(--rl);
  border:1px solid #ebebeb;overflow:hidden;cursor:pointer;
  transition:transform .15s,box-shadow .15s;
}
.card:active{transform:scale(.98)}
.card-img{
  width:100%;aspect-ratio:1;background:#f4f4f4;
  overflow:hidden;display:flex;align-items:center;justify-content:center;
  position:relative;
}
.card-img img{width:100%;height:100%;object-fit:cover}
.no-img{display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:#f4f4f4}
.card-body{padding:9px 10px 0}
.card-price{font-size:13px;font-weight:700;color:var(--teal);margin-bottom:3px}
.card-name{font-size:12px;font-weight:500;line-height:1.4;margin-bottom:9px;color:var(--text)}
.card-add{
  width:100%;padding:10px;border:none;
  border-top:1px solid #f0f0f0;background:var(--w);
  font-size:20px;font-weight:300;color:var(--sub);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.card-add:active{background:var(--teal-lt);color:var(--teal)}
.card-ctrl{
  width:100%;display:flex;align-items:center;
  border-top:1px solid #f0f0f0;background:var(--w);
}
.cc-btn{
  flex:1;padding:10px;border:none;background:none;
  font-size:18px;font-weight:500;color:var(--sub);cursor:pointer;
}
.cc-btn:active{color:var(--teal)}
.cc-n{font-size:14px;font-weight:700;flex-shrink:0;color:var(--text)}

/* ── SEARCH PAGE ── */
.srch-page{
  display:none;position:fixed;inset:0;background:var(--w);
  z-index:80;max-width:480px;left:50%;transform:translateX(-50%);
}
.srch-page.show{display:block}
.srch-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border)}
.srch-back{
  width:38px;height:38px;border-radius:10px;
  border:1px solid var(--border);background:var(--w);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.srch-wrap{
  flex:1;display:flex;align-items:center;gap:8px;
  background:#f4f4f4;border-radius:10px;padding:10px 12px;
}
.srch-inp{border:none;background:none;flex:1;font-family:'Inter',sans-serif;font-size:15px;outline:none;color:var(--text)}
.srch-inp::placeholder{color:#bbb}
.srch-results{padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ── PAGES ── */
.page{
  display:none;position:fixed;inset:0;background:var(--w);
  z-index:70;max-width:480px;left:50%;transform:translateX(-50%);
  overflow-y:auto;padding-bottom:130px;
}
.page.show{display:block}
.pg-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--w);z-index:5;
}
.pg-back{
  width:36px;height:36px;border-radius:50%;
  border:1px solid var(--border);background:var(--w);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text);
}
.pg-title{font-size:17px;font-weight:700;flex:1;text-align:center}
.pg-act{
  width:36px;height:36px;border-radius:50%;
  border:1px solid var(--border);background:var(--w);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--sub);
}

/* ── CART ITEMS ── */
.ci{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border)}
.ci-img{
  width:62px;height:62px;border-radius:10px;
  overflow:hidden;flex-shrink:0;background:#f4f4f4;
  display:flex;align-items:center;justify-content:center;
}
.ci-img img{width:100%;height:100%;object-fit:cover}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:14px;font-weight:600;margin-bottom:3px}
.ci-price{font-size:13px;color:var(--sub)}
.ci-comment{font-size:12px;color:#2563eb;font-weight:500;margin-top:5px;cursor:pointer}
.ci-ctrl{display:flex;align-items:center;gap:10px;background:#f4f4f4;border-radius:24px;padding:6px 12px;flex-shrink:0}
.ci-btn{
  width:24px;height:24px;border-radius:50%;border:none;
  background:var(--w);font-size:16px;font-weight:700;
  color:var(--text);cursor:pointer;display:flex;align-items:center;
  justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.1);
}
.ci-num{font-size:14px;font-weight:700;min-width:18px;text-align:center}

/* ── CART FOOTER ── */
.cart-ft{
  position:fixed;bottom:60px;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;background:var(--w);
  border-top:1px solid var(--border);padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;gap:14px;
}
.cft-l{display:flex;flex-direction:column;gap:1px}
.cft-lbl{font-size:11px;color:var(--muted)}
.cft-sum{font-size:17px;font-weight:800}
.cft-btn{
  background:var(--teal);color:#fff;border:none;
  border-radius:24px;padding:13px 28px;
  font-family:'Inter',sans-serif;font-size:15px;
  font-weight:700;cursor:pointer;white-space:nowrap;
  transition:background .15s;
}
.cft-btn:active{background:var(--teal-dk)}

/* ── BOTTOM NAV ── */
.bnav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;background:var(--w);
  border-top:1px solid var(--border);display:flex;z-index:50;
  padding-bottom:env(safe-area-inset-bottom);
}
.nb{
  flex:1;padding:10px 0 8px;border:none;background:none;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;font-family:'Inter',sans-serif;font-size:11px;
  font-weight:500;color:var(--muted);position:relative;
}
.nb-icon{
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.nb.active .nb-icon{background:var(--teal)}
.nb.active .nb-icon svg{stroke:#fff}
.nb.active{color:var(--text)}
.nb-badge{
  position:absolute;top:4px;right:calc(50% - 24px);
  background:var(--teal);color:#fff;border-radius:50%;
  width:16px;height:16px;display:flex;align-items:center;
  justify-content:center;font-size:10px;font-weight:700;
  border:2px solid var(--w);
}

/* ── SHEETS / OVERLAYS ── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:100;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.overlay.show{opacity:1;pointer-events:all}
.sheet{
  background:var(--w);width:100%;max-width:480px;
  border-radius:20px 20px 0 0;padding:20px 16px 36px;
  transform:translateY(100%);transition:transform .3s ease;
}
.overlay.show .sheet{transform:translateY(0)}
.sh-handle{width:36px;height:4px;background:#e0e0e0;border-radius:2px;margin:0 auto 18px}
.sh-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.sh-title{font-size:17px;font-weight:700}
.sh-reset{font-size:14px;font-weight:600;color:var(--teal);background:none;border:none;cursor:pointer}
.sh-x{
  width:28px;height:28px;border-radius:50%;
  background:#f4f4f4;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:var(--sub);
}
.sort-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 0;border-bottom:1px solid var(--border);cursor:pointer;
}
.sort-row:last-of-type{border-bottom:none}
.sort-lbl{font-size:15px;color:var(--text)}
.radio{width:22px;height:22px;border-radius:50%;border:2px solid #ccc;transition:all .2s;flex-shrink:0}
.radio.on{border:6px solid var(--teal)}
.sh-apply{
  width:100%;background:var(--teal);color:#fff;border:none;
  border-radius:24px;padding:15px;font-family:'Inter',sans-serif;
  font-size:15px;font-weight:700;cursor:pointer;margin-top:18px;
}

/* ── AUTH ── */
.auth-ttl{font-size:21px;font-weight:700;margin-bottom:18px}
.auth-lbl{font-size:12px;color:var(--muted);margin-bottom:7px;font-weight:500}
.phone-wrap{
  display:flex;align-items:center;background:#f4f4f4;
  border-radius:12px;overflow:hidden;margin-bottom:12px;
}
.phone-pre{padding:14px;font-size:15px;font-weight:700;border-right:1px solid #e0e0e0;color:var(--text)}
.phone-inp{flex:1;padding:14px;border:none;background:none;font-family:'Inter',sans-serif;font-size:15px;outline:none;color:var(--text)}
.auth-terms{font-size:12px;color:var(--muted);margin-bottom:18px;line-height:1.6}
.auth-terms a{color:var(--teal);text-decoration:none}
.auth-btn{
  width:100%;background:var(--teal);color:#fff;border:none;
  border-radius:24px;padding:15px;font-family:'Inter',sans-serif;
  font-size:15px;font-weight:700;cursor:pointer;margin-bottom:14px;
}
.auth-div{
  display:flex;align-items:center;gap:12px;color:var(--muted);
  font-size:11px;margin-bottom:14px;text-transform:uppercase;
  font-weight:600;letter-spacing:.5px;
}
.auth-div::before,.auth-div::after{content:'';flex:1;height:1px;background:var(--border)}
.google-btn{
  width:100%;background:var(--w);border:1.5px solid var(--border);
  border-radius:24px;padding:13px;font-family:'Inter',sans-serif;
  font-size:14px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;color:var(--text);
}
.otp-row{display:flex;gap:10px;margin-bottom:18px}
.otp-box{
  flex:1;height:54px;border:1.5px solid var(--border);border-radius:12px;
  font-family:'Inter',sans-serif;font-size:22px;font-weight:700;
  text-align:center;outline:none;color:var(--text);background:var(--w);
}
.otp-box:focus{border-color:var(--teal)}

/* ── PROFILE ── */
.prof-top{padding:20px 16px;border-bottom:1px solid var(--border)}
.prof-hdr{display:flex;justify-content:space-between;align-items:flex-start}
.prof-name{font-size:22px;font-weight:800;margin-bottom:4px}
.prof-phone{font-size:13px;color:var(--muted)}
.prof-acts{display:flex;gap:8px}
.prof-icon-btn{
  width:34px;height:34px;border-radius:50%;
  border:1px solid var(--border);background:var(--w);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--sub);
}
.menu-sep{height:8px;background:var(--bg)}
.menu-row{
  display:flex;align-items:center;gap:14px;
  padding:16px 16px;border-bottom:1px solid var(--border);cursor:pointer;
  transition:background .15s;
}
.menu-row:last-child{border-bottom:none}
.menu-row:active{background:var(--teal-lt)}
.mr-icon{color:var(--muted);flex-shrink:0;width:20px;text-align:center}
.mr-lbl{flex:1;font-size:15px;font-weight:500}
.mr-arr{color:#ccc}
.powered{text-align:center;padding:24px 16px;font-size:13px;color:var(--muted)}
.powered b{color:var(--text)}

/* ── ORDERS ── */
.oc{margin:12px 16px 0;border:1px solid var(--border);border-radius:12px;padding:14px}
.oc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.oc-id{font-size:14px;font-weight:700}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.b-new{background:#fef3c7;color:#92400e}
.b-done{background:#dcfce7;color:#166534}
.b-way{background:#ede9fe;color:#5b21b6}
.oc-items{font-size:13px;color:var(--muted);margin-bottom:5px}
.oc-total{font-size:14px;font-weight:700;color:var(--teal)}
.oc-date{font-size:11px;color:#bbb;margin-top:3px}

/* ── EMPTY ── */
.empty{text-align:center;padding:60px 20px}
.empty h3{font-size:16px;font-weight:700;margin-bottom:8px}
.empty p{font-size:13px;color:var(--muted);margin-bottom:22px}
.empty-btn{
  background:var(--teal);color:#fff;border:none;border-radius:24px;
  padding:13px 28px;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer;
}

/* ── SUCCESS ── */
.suc-ov{
  position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:20px;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.suc-ov.show{opacity:1;pointer-events:all}
.suc-box{background:var(--w);border-radius:20px;padding:36px 24px;text-align:center;width:100%;max-width:300px}
.suc-icon{
  width:68px;height:68px;border-radius:50%;background:var(--teal-lt);
  display:flex;align-items:center;justify-content:center;margin:0 auto 18px;
}
.suc-title{font-size:19px;font-weight:700;color:var(--teal);margin-bottom:7px}
.suc-text{font-size:13px;color:var(--muted);margin-bottom:22px;line-height:1.5}
.suc-btn{
  width:100%;background:var(--teal);color:#fff;border:none;border-radius:24px;
  padding:14px;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;cursor:pointer;
}

.dn{display:none!important}
</style>
</head>
<body>
<div class="app">

<!-- ══ HOME ══ -->
<div id="homeWrap">
  <div class="header">
    <div class="hdr-top">
      <div class="brand">
        <div class="brand-logo">
          <img src="https://raw.githubusercontent.com/axmads-arch/frontend/main/logo.jpg" alt="Rahmat Chef" onerror="this.parentElement.style.background='#1a6b63';this.style.display='none'">
        </div>
        <div class="brand-info">
          <span class="brand-name">Rahmat Chef</span>
          <span class="brand-sub">sweet pastry</span>
        </div>
      </div>
      <div class="hdr-icons">
        <button class="hdr-btn" onclick="App.openSearch()">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
        <button class="hdr-btn">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </button>
      </div>
    </div>
    <div class="dlv-row">
      <div class="dlv-left">
        <span class="dlv-lbl">Доставка</span>
        <span class="dlv-addr" onclick="App.toggleDD()">
          Определение адреса...
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg>
        </span>
      </div>
      <button class="dlv-btn" onclick="App.toggleDD()">
        <span id="ddTxt">Доставка</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg>
      </button>
      <div class="dlv-dd dn" id="delivDD">
        <div class="dd-row" onclick="App.setDelivery('Доставка')">
          Доставка
          <div class="dd-chk" id="chkD"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg></div>
        </div>
        <div class="dd-row" onclick="App.setDelivery('Самовывоз')">
          Самовывоз
          <div class="dd-chk dn" id="chkS"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg></div>
        </div>
      </div>
    </div>
  </div>

  <div class="cats-bar">
    <div class="cats-scroll" id="catsScroll"></div>
  </div>

  <div class="addr-banner" id="addrBanner">
    <h3>Введите адрес доставки</h3>
    <p>По которому курьер сможет вас найти</p>
    <div class="addr-btns">
      <button class="btn-later" onclick="document.getElementById('addrBanner').style.display='none'">Позже</button>
      <button class="btn-addr">Введите адрес</button>
    </div>
  </div>

  <div class="main">
    <div class="sec-title" id="secTitle">Завтраки</div>
    <div class="grid" id="prodGrid"></div>
  </div>
</div>

<!-- ══ SEARCH ══ -->
<div class="srch-page" id="srchPage">
  <div class="srch-hdr">
    <button class="srch-back" onclick="App.closeSearch()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </button>
    <div class="srch-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="srch-inp" type="text" placeholder="Быстрый поиск" id="srchInp" oninput="App.search(this.value)">
    </div>
  </div>
  <div class="srch-results" id="srchResults"></div>
</div>

<!-- ══ CART ══ -->
<div class="page" id="cartPage">
  <div class="pg-hdr">
    <button class="pg-back" onclick="App.closePage('cartPage')">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </button>
    <span class="pg-title">Корзина</span>
    <button class="pg-act" onclick="App.clearCart()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/></svg>
    </button>
  </div>
  <div id="cartContent"></div>
  <div class="cart-ft" id="cartFt">
    <div class="cft-l">
      <span class="cft-lbl">Сумма заказа</span>
      <span class="cft-sum" id="cartSum">0 UZS</span>
    </div>
    <button class="cft-btn" onclick="App.checkout()">Далее</button>
  </div>
</div>

<!-- ══ ORDERS ══ -->
<div class="page" id="ordersPage">
  <div class="pg-hdr">
    <div style="width:36px"></div>
    <span class="pg-title">Заказы</span>
    <div style="width:36px"></div>
  </div>
  <div id="ordersContent"></div>
</div>

<!-- ══ PROFILE ══ -->
<div class="page" id="profilePage">
  <div id="profileContent"></div>
</div>

<!-- ══ BOTTOM NAV ══ -->
<nav class="bnav">
  <button class="nb active" id="nbHome" onclick="App.nav('home',this)">
    <div class="nb-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
    Главная
  </button>
  <button class="nb" id="nbCart" onclick="App.nav('cart',this)">
    <div class="nb-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg></div>
    Корзина
  </button>
  <button class="nb" id="nbOrders" onclick="App.nav('orders',this)">
    <div class="nb-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div>
    Заказы
  </button>
  <button class="nb" id="nbProfile" onclick="App.nav('profile',this)">
    <div class="nb-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
    Профиль
  </button>
</nav>

<!-- ══ SORT SHEET ══ -->
<div class="overlay" id="sortOv" onclick="App.closeSortOut(event)">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div class="sh-top">
      <span class="sh-title">Сортировка</span>
      <button class="sh-reset" onclick="App.resetSort()">Сбросить</button>
      <button class="sh-x" onclick="App.closeSort()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div id="sortOpts"></div>
    <button class="sh-apply" onclick="App.applySort()">Фильтровать</button>
  </div>
</div>

<!-- ══ AUTH SHEET ══ -->
<div class="overlay" id="authOv" onclick="App.closeAuthOut(event)">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div id="authContent"></div>
  </div>
</div>

<!-- ══ SUCCESS ══ -->
<div class="suc-ov" id="sucOv">
  <div class="suc-box">
    <div class="suc-icon">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#1a6b63" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>
    </div>
    <div class="suc-title">Заказ принят!</div>
    <div class="suc-text">Ваш заказ готовится. Ожидайте курьера через 25–35 минут.</div>
    <button class="suc-btn" onclick="App.closeSuccess()">Отлично!</button>
  </div>
</div>

</div>
<script src="app.js"></script>
</body>
</html>
